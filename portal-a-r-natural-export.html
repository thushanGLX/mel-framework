<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>A R Natural Export — My Programme Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
.app{max-width:680px;margin:0 auto;padding:24px 20px 80px}
.topbar{text-align:center;margin-bottom:32px;padding-bottom:22px;border-bottom:1px solid #e0dfd8}
.logo-dot{width:46px;height:46px;border-radius:12px;background:#0F6E56;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:700;margin:0 auto 12px}
.top-title{font-size:19px;font-weight:700;margin-bottom:4px}
.top-sub{font-size:12px;color:#999}
.hero{background:#0F6E56;border-radius:16px;padding:26px 22px;margin-bottom:22px;color:#fff}
.hero-company{font-size:10px;opacity:0.7;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.hero-title{font-size:22px;font-weight:700;margin-bottom:4px}
.hero-sub{font-size:13px;opacity:0.75;line-height:1.6;margin-bottom:20px}
.round-tabs{display:flex;gap:6px}
.round-tab{padding:8px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
.round-tab.active{background:#fff;border-color:#fff;color:#0F6E56}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:14px;padding:20px}
.card+.card{margin-top:14px}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px}
.card-sub{font-size:12px;color:#999;margin-bottom:16px;line-height:1.5}
.metric-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.metric-card{background:#f5f4f0;border-radius:10px;padding:13px;text-align:center}
.metric-label{font-size:10px;color:#aaa;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
.metric-val{font-size:24px;font-weight:700}
.bar-row{margin-bottom:12px}
.bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bar-track{height:7px;background:#f0efe8;border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width 0.6s ease}
.strength-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f5f4f0}
.strength-row:last-child{border-bottom:none}
.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.legend{display:flex;gap:14px;margin-top:10px;justify-content:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:50%}
.progress-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f5f4f0}
.progress-row:last-child{border-bottom:none}
.next-card{background:#f0faf7;border:1px solid #c0e8d8;border-radius:14px;padding:18px 20px;margin-top:14px}
.cap-row{padding:10px 0;border-bottom:1px solid #f5f4f0}
.cap-row:last-child{border-bottom:none}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:#aaa;font-size:13px}
.sp{width:16px;height:16px;border:2px solid #e0dfd8;border-top-color:#0F6E56;border-radius:50%;animation:spin 0.7s linear infinite}
canvas{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo-dot">GL</div>
    <div class="top-title">My Programme Dashboard</div>
    <div class="top-sub">GIZ SME Programme · Good Life X</div>
  </div>
  <div class="hero">
    <div class="hero-company">Your company</div>
    <div class="hero-title">A R Natural Export</div>
    <div class="hero-sub">View your assessment scores and progress. Select an assessment round below.</div>
    <div class="round-tabs">
      <button class="round-tab active" onclick="switchRound('Baseline',this)">Baseline</button>
      <button class="round-tab" onclick="switchRound('Midpoint',this)">Midpoint</button>
      <button class="round-tab" onclick="switchRound('Endpoint',this)">Endpoint</button>
    </div>
  </div>
  <div id="main-content"><div class="loading"><div class="sp"></div>Loading your results...</div></div>
  <div style="display:flex;align-items:center;gap:5px;justify-content:center;margin-top:16px;font-size:11px;color:#aaa">
    <div id="cd" style="width:6px;height:6px;border-radius:50%;background:#ccc"></div>
    <span id="ct">Connecting...</span>
  </div>
</div>
<script>

const AT_KEY  = "pat1Oa1Z0A4zWYneN.1f721a20a51c8f40fca4dd8622a43689002615d2b051d50ffbd09dfdc8348b2d";
const BASE    = "appPFQWqbIP5Twi4r";
const CO_ID   = "recfDu1dqz6X51OJK";
const CO_NAME = "A R Natural Export";

const PILLARS = ["Leadership Capacity", "Management Capacity", "Ops Team / Staff", "Supply Chain", "Demand", "Systems & Processes", "Innovation", "Financial Firepower", "Product / Brand Equity", "Governance & Culture"];
const THRIVE  = [{"id": "P2", "name": "Purpose & Principles"}, {"id": "E2", "name": "Enabling Ecosystem"}, {"id": "T2", "name": "Transformative Tasks"}, {"id": "R2", "name": "Resilient Relationships"}, {"id": "C2", "name": "Conscious Customers"}, {"id": "A2", "name": "Abundant Assets"}, {"id": "M2", "name": "Methods to Market"}, {"id": "I2", "name": "Impactful Investments"}, {"id": "V2", "name": "Verifiable Value"}];

let ALL_ASSESSMENTS = [];
let ALL_FUND        = [];
let ALL_THRIVE_REC  = [];
let ALL_CAPACITY    = [];

async function atGet(path){
  const r = await fetch("https://api.airtable.com/v0/"+BASE+"/"+path,{
    headers:{"Authorization":"Bearer "+AT_KEY}
  });
  return r.json();
}

function avg(arr){
  if(!arr||!arr.length) return 0;
  return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
}

function filterByIds(records, ids){
  return (records||[]).filter(r=>{
    const ar = r.fields["Assessment Record"]||[];
    return Array.isArray(ar) ? ar.some(id=>ids.includes(id)) : ids.includes(ar);
  });
}

async function init(){
  try{
    // Fetch all data upfront — 4 API calls total
    const ad = await atGet("Assesment%20Records?maxRecords=100");
    ALL_ASSESSMENTS = (ad.records||[]).filter(r=>(r.fields["Company"]||[]).includes(CO_ID));

    const allIds = ALL_ASSESSMENTS.map(r=>r.id);

    const fd = await atGet("Fundamental%20Scores?maxRecords=200");
    ALL_FUND = fd.records||[];

    const td = await atGet("THRIVE%20Scores?maxRecords=200");
    ALL_THRIVE_REC = td.records||[];

    const cd = await atGet("Capacity%20Building?maxRecords=200");
    ALL_CAPACITY = filterByIds(cd.records, allIds);

    document.getElementById("cd").style.background="#1D9E75";
    document.getElementById("ct").textContent="Live";
    await renderRound("Baseline");
  }catch(e){
    document.getElementById("cd").style.background="#E24B4A";
    document.getElementById("ct").textContent="Error";
    document.getElementById("main-content").innerHTML="<div class='card'><div style='font-size:13px;color:#c0392b;padding:8px'>Could not load data. Please check your internet connection.</div></div>";
  }
}

function switchRound(round, btn){
  document.querySelectorAll(".round-tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("main-content").innerHTML="<div class='loading'><div class='sp'></div>Loading "+round+"...</div>";
  renderRound(round);
}

async function renderRound(round){
  const el = document.getElementById("main-content");
  const matching = ALL_ASSESSMENTS.filter(r=>r.fields["Assessment Type"]===round);

  if(!matching.length){
    el.innerHTML=`<div class="card" style="text-align:center;padding:36px 20px">
      <div style="font-size:32px;margin-bottom:12px">📋</div>
      <div style="font-size:15px;font-weight:700;color:#888;margin-bottom:6px">No ${round} results yet</div>
      <div style="font-size:13px;color:#aaa;line-height:1.7">Your ${round} assessment hasn't been recorded yet.<br>Check back after your diagnostic call with the programme team.</div>
    </div>
    <div class="next-card">
      <div style="font-size:13px;font-weight:700;color:#0F6E56;margin-bottom:5px">What to expect</div>
      <div style="font-size:13px;color:#444;line-height:1.7">After your diagnostic call, the programme team will score your business across 10 fundamental pillars. Your results will appear here within 24 hours.</div>
    </div>`;
    return;
  }

  const matchIds = matching.map(a=>a.id);
  const allIds   = ALL_ASSESSMENTS.map(a=>a.id);

  const fundRecs   = filterByIds(ALL_FUND, matchIds);
  const thriveRecs = filterByIds(ALL_THRIVE_REC, matchIds);
  const capRecs    = filterByIds(ALL_CAPACITY, allIds);

  // Fundamentals
  const pm = {};
  fundRecs.forEach(r=>{
    const pn = r.fields["Pillar Name"];
    const sc = r.fields["Score (0\u2013100)"];
    if(!pn||sc==null) return;
    if(!pm[pn]) pm[pn]=[];
    pm[pn].push(sc);
  });

  // THRIVE
  const expertT={}, companyT={}, allThriveMap={};
  thriveRecs.forEach(r=>{
    const pn = r.fields["Pillar Name"];
    const sc = r.fields["Score (1\u20135)"];
    const assessor = r.fields["Assessor Name"]||"";
    if(!pn||sc==null) return;
    const t = THRIVE.find(x=>x.name===pn);
    if(!t) return;
    const tid = t.id;
    if(!allThriveMap[tid]) allThriveMap[tid]=[];
    allThriveMap[tid].push(sc);
    if(assessor===CO_NAME){
      if(!companyT[tid]) companyT[tid]=[];
      companyT[tid].push(sc);
    } else {
      if(!expertT[tid]) expertT[tid]=[];
      expertT[tid].push(sc);
    }
  });

  const hasCompany = Object.keys(companyT).length>0;
  const allFundScores = Object.values(pm).flat();
  const overall = avg(allFundScores);
  const strengths = Object.entries(pm).filter(([,v])=>avg(v)>=65).map(([n])=>n);
  const gaps      = Object.entries(pm).filter(([,v])=>avg(v)>0&&avg(v)<50).map(([n])=>n);

  // Progress
  const progressData = {};
  ["Baseline","Midpoint","Endpoint"].forEach(rd=>{
    const rdIds = ALL_ASSESSMENTS.filter(r=>r.fields["Assessment Type"]===rd).map(r=>r.id);
    if(!rdIds.length) return;
    const rdRecs = filterByIds(ALL_FUND, rdIds);
    const sc = rdRecs.map(r=>r.fields["Score (0\u2013100)"]).filter(v=>v!=null);
    if(sc.length) progressData[rd] = avg(sc);
  });

  const expertV  = THRIVE.map(t=>expertT[t.id]  ? avg(expertT[t.id])*20  : 0);
  const companyV = THRIVE.map(t=>companyT[t.id] ? avg(companyT[t.id])*20 : 0);
  const allV     = THRIVE.map(t=>allThriveMap[t.id] ? avg(allThriveMap[t.id])*20 : 0);
  const fundLabels = PILLARS.filter(p=>pm[p]).map(p=>p.split(" ").slice(0,2).join(" "));
  const fundVals   = PILLARS.filter(p=>pm[p]).map(p=>avg(pm[p]));

  // Capacity needs — group by priority
  const highCap   = capRecs.filter(r=>r.fields["Priority"]==="High");
  const medCap    = capRecs.filter(r=>r.fields["Priority"]==="Medium");
  const lowCap    = capRecs.filter(r=>r.fields["Priority"]==="Low");

  el.innerHTML = `
    ${Object.keys(pm).length ? `
    <div class="card">
      <div class="card-title">Your ${round} fundamentals</div>
      <div class="card-sub">Scored by your programme team and averaged across all assessors.</div>
      <div class="metric-grid">
        <div class="metric-card"><div class="metric-label">Overall score</div><div class="metric-val" style="color:#0F6E56">${overall}%</div></div>
        <div class="metric-card"><div class="metric-label">Strengths</div><div class="metric-val" style="color:#185FA5">${strengths.length}</div></div>
        <div class="metric-card"><div class="metric-label">Focus areas</div><div class="metric-val" style="color:#BA7517">${gaps.length}</div></div>
      </div>
      <canvas id="fund-cv" width="240" height="240" style="margin:0 auto 16px"></canvas>
      ${PILLARS.filter(p=>pm[p]).map(p=>{
        const v=avg(pm[p]);const col=v>=70?"#1D9E75":v>=50?"#BA7517":"#E24B4A";
        return `<div class="bar-row"><div class="bar-top"><span style="font-weight:500">${p}</span><span style="font-weight:700;color:${col}">${v}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${col}"></div></div></div>`;
      }).join("")}
    </div>` : ""}

    ${strengths.length||gaps.length ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
      ${strengths.length ? `<div class="card"><div class="card-title" style="font-size:14px;margin-bottom:12px">Key strengths</div>${strengths.map(s=>`<div class="strength-row"><div class="s-dot" style="background:#1D9E75"></div><div style="font-size:13px">${s}</div></div>`).join("")}</div>` : ""}
      ${gaps.length ? `<div class="card"><div class="card-title" style="font-size:14px;margin-bottom:12px">Focus areas</div>${gaps.map(g=>`<div class="strength-row"><div class="s-dot" style="background:#E24B4A"></div><div style="font-size:13px">${g}</div></div>`).join("")}</div>` : ""}
    </div>` : ""}

    ${thriveRecs.length ? `
    <div class="card" style="margin-top:14px">
      <div class="card-title">THRIVE canvas — expert vs your self-assessment</div>
      <div class="card-sub">${hasCompany ? "Green = expert view &nbsp;·&nbsp; Orange = your self-assessment &nbsp;·&nbsp; Grey = all assessors." : "Expert THRIVE scores shown. Complete your self-assessment form to see the comparison."}</div>
      <canvas id="thrive-cv" width="260" height="260" style="margin:0 auto 12px"></canvas>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div>Expert view</div>
        ${hasCompany ? `<div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>Your self-assessment</div>` : ""}
        <div class="legend-item"><div class="legend-dot" style="background:#B4B2A9"></div>All assessors</div>
      </div>
      <div style="margin-top:14px">
        ${THRIVE.filter(t=>allThriveMap[t.id]).map(t=>{
          const ev=expertT[t.id]?avg(expertT[t.id]):0;
          const cv=companyT[t.id]?avg(companyT[t.id]):0;
          const diff=(hasCompany&&cv)?ev-cv:null;
          const gc=diff!==null?(Math.abs(diff)>=2?"#E24B4A":Math.abs(diff)>=1?"#BA7517":"#1D9E75"):"#aaa";
          return `<div style="padding:10px 0;border-bottom:1px solid #f5f4f0">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <div style="display:flex;align-items:center;gap:7px">
                <span style="background:#e0f5ec;color:#085041;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700">${t.id}</span>
                <span style="font-size:12px;font-weight:600">${t.name}</span>
              </div>
              <div style="font-size:11px;display:flex;gap:8px">
                ${ev ? `<span style="color:#0F6E56;font-weight:600">Expert: ${ev}/5</span>` : ""}
                ${hasCompany&&cv ? `<span style="color:#D85A30;font-weight:600">You: ${cv}/5</span>` : ""}
                ${diff!==null ? `<span style="color:${gc};font-weight:600">Gap: ${diff>0?"+":""}${diff}</span>` : ""}
              </div>
            </div>
            <div class="bar-track" style="height:4px;margin-bottom:3px"><div class="bar-fill" style="width:${ev*20}%;background:#0F6E56"></div></div>
            ${hasCompany&&cv ? `<div class="bar-track" style="height:4px"><div class="bar-fill" style="width:${cv*20}%;background:#D85A30"></div></div>` : ""}
          </div>`;
        }).join("")}
      </div>
      ${!hasCompany ? `<div style="margin-top:14px;padding:12px 14px;background:#fff8f0;border:1px solid #f5c4b3;border-radius:8px;font-size:12px;color:#712B13;line-height:1.6">You haven't submitted a self-assessment yet. Ask your programme coordinator for the self-assessment form link.</div>` : ""}
    </div>` : ""}

    ${capRecs.length ? `
    <div class="card" style="margin-top:14px">
      <div class="card-title">Capacity building support identified</div>
      <div class="card-sub">These are the support areas your programme team has identified for you based on the diagnostic assessment.</div>
      ${highCap.length ? `<div style="font-size:11px;font-weight:700;color:#E24B4A;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px">High priority</div>
        ${highCap.map(r=>`<div class="cap-row">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">
            <span style="background:#e6f1fb;color:#0C447C;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">${r.fields["Need Category"]||""}</span>
          </div>
          <div style="font-size:13px;color:#1a1a18;line-height:1.5">${r.fields["Description"]||""}</div>
        </div>`).join("")}` : ""}
      ${medCap.length ? `<div style="font-size:11px;font-weight:700;color:#BA7517;text-transform:uppercase;letter-spacing:0.06em;margin-top:12px;margin-bottom:8px">Medium priority</div>
        ${medCap.map(r=>`<div class="cap-row">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">
            <span style="background:#e6f1fb;color:#0C447C;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">${r.fields["Need Category"]||""}</span>
          </div>
          <div style="font-size:13px;color:#1a1a18;line-height:1.5">${r.fields["Description"]||""}</div>
        </div>`).join("")}` : ""}
      ${lowCap.length ? `<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-top:12px;margin-bottom:8px">Low priority</div>
        ${lowCap.map(r=>`<div class="cap-row">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">
            <span style="background:#e6f1fb;color:#0C447C;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">${r.fields["Need Category"]||""}</span>
          </div>
          <div style="font-size:13px;color:#1a1a18;line-height:1.5">${r.fields["Description"]||""}</div>
        </div>`).join("")}` : ""}
    </div>` : ""}

    ${Object.keys(progressData).length>1 ? `
    <div class="card" style="margin-top:14px">
      <div class="card-title">Your progress</div>
      <div class="card-sub">How your overall score has changed across assessment rounds.</div>
      ${["Baseline","Midpoint","Endpoint"].filter(r=>progressData[r]!=null).map(r=>{
        const v=progressData[r];const col=v>=70?"#1D9E75":v>=50?"#BA7517":"#E24B4A";
        return `<div class="progress-row">
          <div style="font-size:12px;font-weight:600;min-width:75px;color:#555">${r}</div>
          <div style="flex:1"><div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${col}"></div></div></div>
          <div style="font-size:13px;font-weight:700;color:${col};min-width:40px;text-align:right">${v}%</div>
        </div>`;
      }).join("")}
    </div>` : ""}

    <div class="next-card">
      <div style="font-size:13px;font-weight:700;color:#0F6E56;margin-bottom:5px">What happens next?</div>
      <div style="font-size:13px;color:#444;line-height:1.7">Your programme team will share a full written diagnostic report. Use these scores to reflect on where to focus your energy during the Design Lab and Implementation Sprints.</div>
    </div>
  `;

  setTimeout(()=>{
    if(fundVals.length) drawSpider("fund-cv", fundVals, [], [], fundLabels);
    if(thriveRecs.length) drawSpider("thrive-cv", expertV, companyV, allV, THRIVE.map(t=>t.id));
  }, 100);
}

function drawSpider(id, eV, cV, aV, labels){
  const cv=document.getElementById(id); if(!cv) return;
  const ctx=cv.getContext("2d"),n=labels.length,cx=cv.width/2,cy=cv.height/2,r=Math.min(cx,cy)-30;
  function ang(i){ return (Math.PI*2*i/n)-Math.PI/2; }
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let f=0.25;f<=1.01;f+=0.25){
    ctx.beginPath();
    for(let i=0;i<n;i++){const a=ang(i),x=cx+r*f*Math.cos(a),y=cy+r*f*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.closePath();ctx.strokeStyle="rgba(0,0,0,0.07)";ctx.lineWidth=0.8;ctx.stroke();
  }
  for(let i=0;i<n;i++){const a=ang(i);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle="rgba(0,0,0,0.08)";ctx.lineWidth=0.6;ctx.stroke();}
  function ds(vals,sc,fc,lw){
    if(!vals||!vals.length||!vals.some(v=>v>0)) return;
    ctx.beginPath();
    for(let i=0;i<vals.length;i++){const a=ang(i),f=vals[i]/100,x=cx+r*f*Math.cos(a),y=cy+r*f*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.closePath();ctx.fillStyle=fc;ctx.fill();ctx.strokeStyle=sc;ctx.lineWidth=lw;ctx.stroke();
  }
  ds(aV,"#B4B2A9","rgba(180,178,169,0.08)",1.2);
  ds(eV,"#0F6E56","rgba(15,110,86,0.12)",2);
  ds(cV,"#D85A30","rgba(216,90,48,0.10)",2);
  for(let i=0;i<n;i++){
    const a=ang(i),lx=cx+(r+20)*Math.cos(a),ly=cy+(r+20)*Math.sin(a);
    let lb=labels[i]; if(lb.length>12) lb=lb.slice(0,11)+"...";
    ctx.font="9px -apple-system,sans-serif";ctx.fillStyle="#777";
    ctx.textAlign=Math.cos(a)>0.15?"left":Math.cos(a)<-0.15?"right":"center";
    ctx.textBaseline=Math.sin(a)>0.15?"top":Math.sin(a)<-0.15?"bottom":"middle";
    ctx.fillText(lb,lx,ly);
  }
}

init();

</script>
</body>
</html>
