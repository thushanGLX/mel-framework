<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AiGrow — My Programme Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:24px 20px 80px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #e0dfd8}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:34px;height:34px;border-radius:9px;background:#0F6E56;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.logo-text{font-size:15px;font-weight:700}.logo-sub{font-size:11px;color:#999}
.conn{display:flex;align-items:center;gap:5px;font-size:11px;color:#aaa}
.conn-dot{width:6px;height:6px;border-radius:50%;background:#ccc}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:14px;padding:20px}
.card+.card,.card+div>.card{margin-top:14px}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px}
.card-sub{font-size:12px;color:#999;margin-bottom:16px;line-height:1.5}
.field-group{margin-bottom:14px}
.field-label{font-size:12px;color:#555;margin-bottom:5px;display:block;font-weight:500}
select,input[type=text],textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #ddd;background:#fafaf8;font-size:13px;color:#1a1a18;font-family:inherit;outline:none;transition:border 0.15s}
select:focus,input:focus,textarea:focus{border-color:#0F6E56}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.submit-btn{width:100%;padding:13px;border-radius:10px;background:#0F6E56;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-top:18px;font-family:inherit;transition:all 0.15s}
.submit-btn:hover{background:#085041}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.back-btn{background:transparent;border:none;color:#888;font-size:13px;cursor:pointer;padding:0;margin-bottom:20px;display:flex;align-items:center;gap:5px;font-family:inherit}
.back-btn:hover{color:#1a1a18}
.pillar-row{border-bottom:1px solid #f0efe8;padding:14px 0}
.pillar-row:last-child{border-bottom:none;padding-bottom:0}
.pillar-name{font-size:13px;font-weight:600;margin-bottom:2px}
.pillar-sub{font-size:11px;color:#aaa;margin-bottom:10px}
.score-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.score-lbl{font-size:11px;color:#888;min-width:90px}
.score-val{font-size:13px;font-weight:700;min-width:36px;text-align:right}
input[type=range]{flex:1;accent-color:#0F6E56;cursor:pointer}
.conf-row{display:flex;gap:6px;margin-top:6px}
.conf-btn{padding:4px 12px;border-radius:6px;border:1px solid #ddd;font-size:11px;cursor:pointer;background:#fff;color:#888;font-family:inherit;transition:all 0.15s}
.conf-btn.h{background:#e0f5ec;border-color:#1D9E75;color:#085041;font-weight:600}
.conf-btn.m{background:#fef3e2;border-color:#BA7517;color:#633806;font-weight:600}
.conf-btn.l{background:#fde8e8;border-color:#E24B4A;color:#791F1F;font-weight:600}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:#f5f4f0;border-radius:10px;padding:13px;text-align:center}
.metric-label{font-size:10px;color:#aaa;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
.metric-val{font-size:24px;font-weight:700}
.bar-row{margin-bottom:12px}
.bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bar-track{height:6px;background:#f0efe8;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0F6E56;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.toast.show{opacity:1}
.sp{width:16px;height:16px;border:2px solid #e0dfd8;border-top-color:#0F6E56;border-radius:50%;animation:spin 0.7s linear infinite}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:#aaa;font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
.legend{display:flex;gap:16px;margin-top:10px;justify-content:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:50%}
.thrive-id-badge{background:#e0f5ec;color:#085041;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:0.04em}
.tag{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:500}
.tg{background:#e0f5ec;color:#085041}
.ta{background:#fef3e2;color:#633806}
canvas{display:block}

.hero{background:#0F6E56;border-radius:16px;padding:26px 22px;margin-bottom:22px;color:#fff}
.hero-company{font-size:10px;opacity:0.65;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.hero-title{font-size:22px;font-weight:700;margin-bottom:6px}
.hero-sub{font-size:13px;opacity:0.75;line-height:1.6;margin-bottom:18px}
.round-tabs{display:flex;gap:6px}
.round-tab{padding:7px 16px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.round-tab.active{background:#fff;border-color:#fff;color:#0F6E56}
.strength-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f5f4f0}
.strength-row:last-child{border-bottom:none}
.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.thrive-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.thrive-card{background:#f5fefa;border:1px solid #d0eee3;border-radius:10px;padding:12px}
.star{width:13px;height:13px;border-radius:3px;display:inline-block}
.star.on{background:#0F6E56}
.star.off{background:#dde9e4}
.next-card{background:#f0faf7;border:1px solid #c0e8d8;border-radius:14px;padding:18px 20px;margin-top:14px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-dot">GL</div>
      <div><div class="logo-text">My Programme Dashboard</div><div class="logo-sub">GIZ · Investment Readiness Programme · Good Life X</div></div>
    </div>
    <div class="conn"><div class="conn-dot" id="cd"></div><span id="ct">Loading...</span></div>
  </div>
  <div class="hero">
    <div class="hero-company">Your company</div>
    <div class="hero-title">AiGrow</div>
    <div class="hero-sub">View your assessment scores and progress. Select an assessment round below.</div>
    <div class="round-tabs">
      <button class="round-tab active" onclick="switchRound('Baseline',this)">Baseline</button>
      <button class="round-tab" onclick="switchRound('Midpoint',this)">Midpoint</button>
      <button class="round-tab" onclick="switchRound('Endpoint',this)">Endpoint</button>
    </div>
  </div>
  <div id="main-content"><div class="loading"><div class="sp"></div>Loading your results...</div></div>
  <div class="toast" id="toast"></div>
</div>
<script>

const AT_KEY="pat1Oa1Z0A4zWYneN.1f721a20a51c8f40fca4dd8622a43689002615d2b051d50ffbd09dfdc8348b2d";
const BASE="appPFQWqbIP5Twi4r";
const THRIVE=[
  {id:"P2",name:"Purpose & Principles"},
  {id:"E2",name:"Enabling Ecosystem"},
  {id:"T2",name:"Transformative Tasks"},
  {id:"R2",name:"Resilient Relationships"},
  {id:"C2",name:"Conscious Customers"},
  {id:"A2",name:"Abundant Assets"},
  {id:"M2",name:"Methods to Market"},
  {id:"I2",name:"Impactful Investments"},
  {id:"V2",name:"Verifiable Value"}
];
const PILLARS=["Leadership Capacity","Management Capacity","Ops Team / Staff","Supply Chain","Demand","Systems & Processes","Data & Information","Financial Firepower","Product / Brand Equity","Governance & Culture"];

function toast(msg,dur=3000){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),dur);}
async function atGet(path){const r=await fetch(`https://api.airtable.com/v0/${BASE}/${path}`,{headers:{"Authorization":`Bearer ${AT_KEY}`}});return r.json();}
async function atPost(path,body){const r=await fetch(`https://api.airtable.com/v0/${BASE}/${path}`,{method:"POST",headers:{"Authorization":`Bearer ${AT_KEY}`,"Content-Type":"application/json"},body:JSON.stringify(body)});return r.json();}
function avg(arr){return arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;}

function drawThreeWaySpider(canvasId, labels, expertVals, companyVals, assessorVals){
  const cv=document.getElementById(canvasId);if(!cv)return;
  const ctx=cv.getContext("2d"),n=labels.length,cx=cv.width/2,cy=cv.height/2,r=Math.min(cx,cy)-38;
  const ang=i=>(Math.PI*2*i)/n-Math.PI/2;
  ctx.clearRect(0,0,cv.width,cv.height);
  [0.25,0.5,0.75,1].forEach(f=>{
    ctx.beginPath();
    labels.forEach((_,i)=>{const a=ang(i),x=cx+r*f*Math.cos(a),y=cy+r*f*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.closePath();ctx.strokeStyle="rgba(0,0,0,0.07)";ctx.lineWidth=0.8;ctx.stroke();
  });
  labels.forEach((_,i)=>{const a=ang(i);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle="rgba(0,0,0,0.08)";ctx.lineWidth=0.6;ctx.stroke();});
  function drawSeries(vals,color,fill,lw){
    if(!vals||!vals.length)return;
    ctx.beginPath();
    vals.forEach((v,i)=>{const a=ang(i),f=v/100,x=cx+r*f*Math.cos(a),y=cy+r*f*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.stroke();
  }
  if(assessorVals&&assessorVals.length)drawSeries(assessorVals,"#B4B2A9","rgba(180,178,169,0.08)",1.2);
  if(expertVals&&expertVals.length)drawSeries(expertVals,"#0F6E56","rgba(15,110,86,0.12)",2);
  if(companyVals&&companyVals.length)drawSeries(companyVals,"#D85A30","rgba(216,90,48,0.10)",2);
  labels.forEach((lbl,i)=>{
    const a=ang(i),lx=cx+(r+24)*Math.cos(a),ly=cy+(r+24)*Math.sin(a);
    ctx.font="9px -apple-system,sans-serif";ctx.fillStyle="#666";
    ctx.textAlign=Math.cos(a)>0.15?"left":Math.cos(a)<-0.15?"right":"center";
    ctx.textBaseline=Math.sin(a)>0.15?"top":Math.sin(a)<-0.15?"bottom":"middle";
    ctx.fillText(lbl.length>12?lbl.slice(0,11)+"…":lbl,lx,ly);
  });
}

const CO_ID="recV0Oak0Ru40FCtF";
const CO_NAME="AiGrow";
let ALL_ASSESSMENTS=[];

async function init(){
  try{
    const formula=encodeURIComponent(`FIND("${CO_ID}",ARRAYJOIN({Company}))`);
    const d=await atGet(`Assessment%20Records?filterByFormula=${formula}&maxRecords=50`);
    ALL_ASSESSMENTS=d.records||[];
    document.getElementById("cd").style.background="#1D9E75";
    document.getElementById("ct").textContent="Live";
    await renderRound("Baseline");
  }catch(e){
    document.getElementById("cd").style.background="#E24B4A";
    document.getElementById("ct").textContent="Error";
    document.getElementById("main-content").innerHTML=`<div class="card"><div style="font-size:13px;color:#c0392b;padding:8px">Could not load data. Please check your internet connection.</div></div>`;
  }
}

function switchRound(round,btn){
  document.querySelectorAll(".round-tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("main-content").innerHTML=`<div class="loading"><div class="sp"></div>Loading ${round}...</div>`;
  renderRound(round);
}

async function renderRound(round){
  const el=document.getElementById("main-content");
  const matching=ALL_ASSESSMENTS.filter(r=>r.fields["Assessment Type"]===round);
  if(!matching.length){
    el.innerHTML=`
      <div class="card" style="text-align:center;padding:36px 20px">
        <div style="font-size:32px;margin-bottom:12px">📋</div>
        <div style="font-size:15px;font-weight:700;color:#888;margin-bottom:6px">No ${round} results yet</div>
        <div style="font-size:13px;color:#aaa;line-height:1.7">Your ${round} assessment hasn't been recorded yet.<br>Check back after your diagnostic call with the programme team.</div>
      </div>
      <div class="next-card">
        <div style="font-size:13px;font-weight:700;color:#0F6E56;margin-bottom:5px">What to expect</div>
        <div style="font-size:13px;color:#444;line-height:1.7">After your diagnostic call, the programme team will score your business across 10 fundamental pillars. Your results will appear here within 24 hours.</div>
      </div>`;
    return;
  }
  let fundRecs=[],thriveRecs=[];
  for(const a of matching){
    const f2=encodeURIComponent(`FIND("${a.id}",ARRAYJOIN({Assessment Record}))`);
    const fd=await atGet(`Fundamental%20Scores?filterByFormula=${f2}&maxRecords=200`);
    fundRecs.push(...(fd.records||[]));
    const td=await atGet(`THRIVE%20Scores?filterByFormula=${f2}&maxRecords=100`);
    thriveRecs.push(...(td.records||[]));
  }
  const pm={};
  fundRecs.forEach(r=>{const pn=r.fields["Pillar Name"];if(!pn)return;if(!pm[pn])pm[pn]=[];if(r.fields["Score (0-100)"]!=null)pm[pn].push(r.fields["Score (0-100)"]);  });
  const expertT={},companyT={},allT={};
  thriveRecs.forEach(r=>{
    const pc=r.fields["Pillar Code"],role=r.fields["Assessor Role"]||"",sc=r.fields["Score (1-5)"];
    if(!pc||sc==null)return;
    if(!allT[pc])allT[pc]=[];allT[pc].push(sc);
    if(role==="Company"){if(!companyT[pc])companyT[pc]=[];companyT[pc].push(sc);}
    else{if(!expertT[pc])expertT[pc]=[];expertT[pc].push(sc);}
  });
  const hasCompany=Object.keys(companyT).length>0;
  const allFundScores=Object.values(pm).flatMap(v=>v);
  const overall=allFundScores.length?avg(allFundScores):0;
  const strengths=Object.entries(pm).filter(([,v])=>avg(v)>=65).map(([n])=>n);
  const gaps=Object.entries(pm).filter(([,v])=>avg(v)>0&&avg(v)<50).map(([n])=>n);
  const progressData={};
  for(const rd of["Baseline","Midpoint","Endpoint"]){
    const rdM=ALL_ASSESSMENTS.filter(r=>r.fields["Assessment Type"]===rd);
    if(rdM.length){
      let rr=[];
      for(const a of rdM){const f3=encodeURIComponent(`FIND("${a.id}",ARRAYJOIN({Assessment Record}))`);const rd2=await atGet(`Fundamental%20Scores?filterByFormula=${f3}&maxRecords=200`);rr.push(...(rd2.records||[]));};
      const sc=rr.map(r=>r.fields["Score (0-100)"]).filter(v=>v!=null);
      if(sc.length)progressData[rd]=avg(sc);
    }
  }
  const expertV=THRIVE.map(t=>expertT[t.id]?avg(expertT[t.id])*20:0);
  const companyV=THRIVE.map(t=>companyT[t.id]?avg(companyT[t.id])*20:0);
  const allV=THRIVE.map(t=>allT[t.id]?avg(allT[t.id])*20:0);
  const fundLabels=PILLARS.filter(p=>pm[p]).map(p=>p.split(" ").slice(0,2).join(" "));
  const fundVals=PILLARS.filter(p=>pm[p]).map(p=>avg(pm[p]));
  el.innerHTML=`
    ${Object.keys(pm).length?`
    <div class="card">
      <div class="card-title">Your ${round} fundamentals</div>
      <div class="card-sub">Scored by your programme team and averaged across all assessors.</div>
      <div class="metric-grid">
        <div class="metric-card"><div class="metric-label">Overall score</div><div class="metric-val" style="color:#0F6E56">${overall}%</div></div>
        <div class="metric-card"><div class="metric-label">Strengths</div><div class="metric-val" style="color:#185FA5">${strengths.length}</div></div>
        <div class="metric-card"><div class="metric-label">Focus areas</div><div class="metric-val" style="color:#BA7517">${gaps.length}</div></div>
      </div>
      <canvas id="fund-cv" width="260" height="260" style="margin:0 auto 16px"></canvas>
      ${PILLARS.filter(p=>pm[p]).map(p=>{const v=avg(pm[p]);const col=v>=70?"#1D9E75":v>=50?"#BA7517":"#E24B4A";return`<div class="bar-row"><div class="bar-top"><span style="font-size:12px;font-weight:500">${p}</span><span style="font-weight:700;color:${col}">${v}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${col}"></div></div></div>`;}).join("")}
    </div>`:"" }

    ${strengths.length||gaps.length?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px">
      ${strengths.length?`<div class="card"><div class="card-title" style="font-size:14px;margin-bottom:12px">Key strengths</div>${strengths.map(s=>`<div class="strength-row"><div class="s-dot" style="background:#1D9E75"></div><div style="font-size:13px">${s}</div></div>`).join("")}</div>`:"" }
      ${gaps.length?`<div class="card"><div class="card-title" style="font-size:14px;margin-bottom:12px">Focus areas</div>${gaps.map(g=>`<div class="strength-row"><div class="s-dot" style="background:#E24B4A"></div><div style="font-size:13px">${g}</div></div>`).join("")}</div>`:"" }
    </div>`:"" }

    ${thriveRecs.length?`<div class="card" style="margin-top:14px">
      <div class="card-title">THRIVE canvas — expert vs your self-assessment</div>
      <div class="card-sub">${hasCompany?"Green = expert view · Orange = your self-assessment · Grey = all individual assessors. The gap shows where perceptions differ.":"Expert THRIVE scores shown. Complete your self-assessment form to see the comparison."}</div>
      <canvas id="thrive-cv" width="280" height="280" style="margin:0 auto 12px"></canvas>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div>Expert view</div>
        ${hasCompany?`<div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>Your self-assessment</div>`:"" }
        <div class="legend-item"><div class="legend-dot" style="background:#B4B2A9"></div>All assessors</div>
      </div>
      <div style="margin-top:16px">
        ${THRIVE.filter(t=>allT[t.id]).map(t=>{
          const ev=expertT[t.id]?avg(expertT[t.id]):0;
          const cv=companyT[t.id]?avg(companyT[t.id]):0;
          const diff=hasCompany&&cv?ev-cv:null;
          const gapCol=diff!==null?(Math.abs(diff)>=2?"#E24B4A":Math.abs(diff)>=1?"#BA7517":"#1D9E75"):"#aaa";
          return`<div style="padding:10px 0;border-bottom:1px solid #f5f4f0">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <div style="display:flex;align-items:center;gap:7px">
                <span style="background:#e0f5ec;color:#085041;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700">${t.id}</span>
                <span style="font-size:12px;font-weight:600">${t.name}</span>
              </div>
              <div style="font-size:11px;display:flex;gap:8px">
                ${ev?`<span style="color:#0F6E56;font-weight:600">Expert: ${ev}/5</span>`:"" }
                ${hasCompany&&cv?`<span style="color:#D85A30;font-weight:600">You: ${cv}/5</span>`:"" }
                ${diff!==null?`<span style="color:${gapCol};font-weight:600">Gap: ${diff>0?"+":""}${diff}</span>`:"" }
              </div>
            </div>
            <div class="bar-track" style="height:4px;margin-bottom:3px"><div class="bar-fill" style="width:${ev*20}%;background:#0F6E56"></div></div>
            ${hasCompany&&cv?`<div class="bar-track" style="height:4px"><div class="bar-fill" style="width:${cv*20}%;background:#D85A30"></div></div>`:"" }
          </div>`;
        }).join("")}
      </div>
      ${!hasCompany?`<div style="margin-top:14px;padding:12px 14px;background:#fff8f0;border:1px solid #f5c4b3;border-radius:8px;font-size:12px;color:#712B13;line-height:1.6">You haven't submitted a self-assessment yet. Ask your programme coordinator for the self-assessment form link.</div>`:"" }
    </div>`:"" }

    ${Object.keys(progressData).length>1?`<div class="card" style="margin-top:14px">
      <div class="card-title">Your progress over time</div>
      <div class="card-sub">Average fundamental score across all rounds completed so far.</div>
      ${["Baseline","Midpoint","Endpoint"].filter(r=>progressData[r]!=null).map(r=>{const v=progressData[r];const col=v>=70?"#1D9E75":v>=50?"#BA7517":"#E24B4A";return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f5f4f0"><div style="font-size:12px;font-weight:600;min-width:72px;color:#555">${r}</div><div style="flex:1"><div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${col}"></div></div></div><div style="font-size:13px;font-weight:700;color:${col};min-width:38px;text-align:right">${v}%</div></div>`;}).join("")}
    </div>`:"" }

    <div class="next-card">
      <div style="font-size:13px;font-weight:700;color:#0F6E56;margin-bottom:5px">What happens next?</div>
      <div style="font-size:13px;color:#444;line-height:1.7">Your programme team will share a full written diagnostic report. Use these scores to reflect on where to focus during the Design Lab and Implementation Sprints.</div>
    </div>
  `;
  setTimeout(()=>{
    if(fundVals.length)drawThreeWaySpider("fund-cv",fundLabels,[fundVals],[],[]);
